<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeZone Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo">
            <img src="assets/logo-pu.png" class="logo-icon" alt="Logo PU">
            <span class="logo-text">SAFEZONE</span>
        </a>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="guide.html">Guide</a>
        </nav>
    </header>

    <main class="dashboard-layout">

        <section class="map-section">
            <div class="map-placeholder">
                <div class="map-frame">
                    <iframe src="map/map.html" class="map-iframe"></iframe>
                </div>
            </div>
        </section>

        <aside class="sidebar">

            <div class="chat-card" id="ask-card">

                <h3 class="agent-title">
                    <svg class="robot-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="9" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
                        <rect x="9" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>
                        <rect x="13" y="13" width="2" height="2" rx="0.5" fill="currentColor"/>
                        <path d="M9 19v2M15 19v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M12 9V6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <circle cx="12" cy="5" r="1.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5 13H3M21 13h-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    SafeZone Agent
                </h3>

                <p class="card-subtitle">
                    Tanyakan sesuatu mengenai risiko bencana.
                </p>

                <textarea
                    id="question"
                    placeholder="Contoh: Provinsi mana yang paling rawan bencana?"
                ></textarea>

                <div class="dropdown-group">
                    
                    <div class="dropdown-wrapper">
                        <label class="dropdown-label">Atau pilih pertanyaan:</label>
                        <div class="custom-select">
                            <select id="prompt-select" onchange="handlePromptSelect()">
                                <option value="">— Pilih pertanyaan —</option>
                                <option value="Bencana apa yang paling berisiko di [PROVINSI]?">Risiko di provinsi tertentu</option>
                                <option value="Risiko apa di [PROVINSI]?">Detail risiko per provinsi</option>
                                <option value="Provinsi mana yang paling rawan?">Provinsi paling rawan</option>
                                <option value="Kabupaten/kota mana paling rawan?">Kota/Kabupaten paling rawan</option>
                                <option value="Urutkan tahun paling banyak bencana?">Urutan tahun bencana</option>
                                <option value="Risiko bencana apa yang paling sering terjadi?">Bencana paling sering</option>
                                <option value="Berapa banyak kejadian bencana tahun [TAHUN]?">Jumlah bencana tahun spesifik</option>
                                <option value="Pada tahun [TAHUN] apa jenis bencana yang paling berisiko?">Risiko bencana tahun spesifik</option>
                                <option value="List apa saja nama bencana di indonesia?">Daftar semua jenis bencana</option>
                            </select>
                            <span class="select-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                        </div>
                    </div>

                    <div class="dropdown-wrapper hidden" id="prov-wrapper">
                        <label class="dropdown-label">Pilih Provinsi:</label>
                        <div class="custom-select">
                            <select id="prov-select" onchange="buildQuestion()">
                                <option value="">— Pilih —</option>
                                <option value="Aceh">Aceh</option>
                                <option value="Bali">Bali</option>
                                <option value="Banten">Banten</option>
                                <option value="Bengkulu">Bengkulu</option>
                                <option value="DI Yogyakarta">DI Yogyakarta</option>
                                <option value="DKI Jakarta">DKI Jakarta</option>
                                <option value="Gorontalo">Gorontalo</option>
                                <option value="Jambi">Jambi</option>
                                <option value="Jawa Barat">Jawa Barat</option>
                                <option value="Jawa Tengah">Jawa Tengah</option>
                                <option value="Jawa Timur">Jawa Timur</option>
                                <option value="Kalimantan Barat">Kalimantan Barat</option>
                                <option value="Kalimantan Selatan">Kalimantan Selatan</option>
                                <option value="Kalimantan Tengah">Kalimantan Tengah</option>
                                <option value="Kalimantan Timur">Kalimantan Timur</option>
                                <option value="Kalimantan Utara">Kalimantan Utara</option>
                                <option value="Kepulauan Bangka Belitung">Kepulauan Bangka Belitung</option>
                                <option value="Kepulauan Riau">Kepulauan Riau</option>
                                <option value="Lampung">Lampung</option>
                                <option value="Maluku">Maluku</option>
                                <option value="Maluku Utara">Maluku Utara</option>
                                <option value="Nusa Tenggara Barat">Nusa Tenggara Barat</option>
                                <option value="Nusa Tenggara Timur">Nusa Tenggara Timur</option>
                                <option value="Papua">Papua</option>
                                <option value="Papua Barat">Papua Barat</option>
                                <option value="Riau">Riau</option>
                                <option value="Sulawesi Barat">Sulawesi Barat</option>
                                <option value="Sulawesi Selatan">Sulawesi Selatan</option>
                                <option value="Sulawesi Tengah">Sulawesi Tengah</option>
                                <option value="Sulawesi Tenggara">Sulawesi Tenggara</option>
                                <option value="Sulawesi Utara">Sulawesi Utara</option>
                                <option value="Sumatera Barat">Sumatera Barat</option>
                                <option value="Sumatera Selatan">Sumatera Selatan</option>
                                <option value="Sumatera Utara">Sumatera Utara</option>
                            </select>
                            <span class="select-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                        </div>
                    </div>

                    <div class="dropdown-wrapper hidden" id="tahun-wrapper">
                        <label class="dropdown-label">Pilih Tahun:</label>
                        <div class="custom-select">
                            <select id="tahun-select" onchange="buildQuestion()">
                                <option value="">— Pilih —</option>
                                <option value="2019">2019</option>
                                <option value="2020">2020</option>
                                <option value="2021">2021</option>
                                <option value="2022">2022</option>
                                <option value="2023">2023</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                            </select>
                            <span class="select-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                        </div>
                    </div>

                </div>

                <button class="send-btn" onclick="sendQuestion()">
                    Analisis
                </button>

            </div>

            <div class="answer-card hidden" id="answer-card">
                <div class="answer-header">
                    <h3>Analysis Result</h3>
                    <button class="close-answer" onclick="closeAnswer()">✕</button>
                </div>
                <div id="answer-content"></div>
            </div>

        </aside>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
